name: 🚀 Deploy Laravel (SSH)
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Deploy via SSH (Pull & Backend)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY_PRIVATE }}
          port: 2223
          script: |
            cd ~/public_html/domains/e-asset-yuasa.my.id
            echo "📦 Pull latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            echo "🧰 Install Composer dependencies..."
            ~/bin/composer install --no-dev --optimize-autoloader --ignore-platform-reqs
            echo "🚀 Run Laravel optimizations..."
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✅ Backend deploy finished!"

      - name: Copy Built Assets to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY_PRIVATE }}
          port: 2223
          source: "public/build"
          target: "public_html/domains/e-asset-yuasa.my.id"
